parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # ——— Câblage des abstractions d'intégrité ———
    # Ces alias rendent explicites les choix de sécurité. Pour durcir en prod,
    # on remplace l'implémentation ICI, sans toucher au code métier.

    # Aléa : CSPRNG. NE JAMAIS pointer vers un PRNG seedé (timing redeviendrait
    # prédictible → anti-triche cassé).
    App\Integrity\RandomnessSource: '@App\Integrity\CsprngRandomnessSource'

    # Coffre de graines PERSISTANT (pool de cache dédié, hors base applicative).
    # Survit entre process (PHP-FPM / commandes), donc seal() et reveal() peuvent
    # tomber dans des process différents. En prod : pointer seal_store.pool vers
    # Redis/secret manager (cf. CacheSealStore / GH-196).
    App\Integrity\CacheSealStore:
        arguments:
            $sealStorePool: '@seal_store.pool'
    App\Integrity\SealStore: '@App\Integrity\CacheSealStore'

    # Ancrage externe de la tête de chaîne. MVP = log. En prod : RFC 3161 /
    # auditeur externe / OpenTimestamps.
    App\Integrity\AnchorSink: '@App\Integrity\LoggerAnchorSink'
